version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      SQLITE_DB_PATH: /app/data/careerfit.db
      LLM_PROVIDER: local
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: llama3.1:8b
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8501:8501"
    environment:
      SQLITE_DB_PATH: /app/data/careerfit.db
    depends_on:
      - api
    volumes:
      - ./data:/app/data
