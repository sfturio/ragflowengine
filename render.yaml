services:
  - type: web
    name: careerfit-rag-engine
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -e .
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: LLM_PROVIDER
        value: disabled
      - key: DATABASE_URL
        sync: false
