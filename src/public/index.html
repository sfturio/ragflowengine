<!DOCTYPE html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAGFlow Engine</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'surface': '#f8f9fa',
              'surface-container-low': '#f3f4f5',
              'surface-container-lowest': '#ffffff',
              'surface-container-high': '#e7e8e9',
              'surface-container-highest': '#e1e3e4',
              'on-surface': '#191c1d',
              'on-surface-variant': '#464554',
              'primary': '#4648d4',
              'primary-container': '#6063ee',
              'primary-fixed': '#e1e0ff',
              'tertiary-container': '#b55d00',
              'outline-variant': '#c7c4d7',
              'error': '#ba1a1a'
            },
            boxShadow: {
              ambient: '0px 12px 32px rgba(25, 28, 29, 0.04)'
            },
            borderRadius: {
              xl2: '1rem'
            }
          }
        }
      };
    </script>
    <style>
      body { font-family: 'Inter', sans-serif; }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 450, 'GRAD' 0, 'opsz' 24;
      }
      .glass-nav {
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .editorial-grid {
        background-image: radial-gradient(circle at 1px 1px, rgba(70, 69, 84, 0.05) 1px, transparent 0);
        background-size: 24px 24px;
      }
      .progress-ring {
        transform: rotate(-90deg);
      }
      .progress-ring__track {
        stroke: rgba(225, 227, 228, 0.5);
      }
      .progress-ring__value {
        stroke: #4648d4;
        stroke-linecap: round;
        transition: stroke-dashoffset 0.4s ease;
      }
    </style>
  </head>
  <body class="bg-surface text-on-surface">
    <nav class="fixed top-0 left-0 right-0 z-50 h-16 px-6 bg-surface-container-lowest/80 glass-nav border-b border-outline-variant/20 flex items-center">
      <div class="font-bold tracking-tight text-2xl">AI Career Suite</div>
      <div class="hidden md:flex items-center gap-3 ml-8 text-sm font-semibold text-on-surface-variant">
        <span id="nav-other-text">Check our other app:</span>
        <a id="nav-other-link" href="https://atsflowengine.onrender.com/" target="_blank" rel="noopener noreferrer" class="text-primary hover:text-primary-container transition-colors">ATSFlow Engine</a>
      </div>
      <div class="ml-auto flex items-center gap-3">
        <button id="translate-btn" class="px-3 py-1.5 rounded-lg bg-surface-container-low text-xs font-semibold text-on-surface hover:bg-surface-container-high transition-colors">PT</button>
        <span class="material-symbols-outlined text-on-surface-variant">auto_awesome</span>
      </div>
    </nav>

    <div class="pt-16 min-h-screen flex">
      <aside class="hidden lg:flex flex-col w-72 h-[calc(100vh-64px)] sticky top-16 bg-surface-container-low p-5 gap-6 editorial-grid">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-primary-container text-white flex items-center justify-center shadow-ambient">
            <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">psychology</span>
          </div>
          <div>
            <h1 class="font-bold text-3xl leading-none">RAGFlow</h1>
            <p class="text-[11px] uppercase tracking-[0.14em] text-on-surface-variant mt-1">Intelligent Workspace</p>
          </div>
        </div>

        <nav class="space-y-1" id="side-nav">
          <button data-nav="match" class="w-full text-left px-4 py-3 rounded-xl bg-surface-container-lowest text-primary shadow-sm font-semibold flex items-center gap-3">
            <span class="material-symbols-outlined">analytics</span><span id="side-nav-match">Match Analysis</span>
          </button>
          <button data-nav="result" class="w-full text-left px-4 py-3 rounded-xl text-on-surface-variant hover:bg-surface-container-high transition-colors font-semibold flex items-center gap-3">
            <span class="material-symbols-outlined">insights</span><span id="side-nav-result">Career Result</span>
          </button>
          <button data-nav="history" class="w-full text-left px-4 py-3 rounded-xl text-on-surface-variant hover:bg-surface-container-high transition-colors font-semibold flex items-center gap-3">
            <span class="material-symbols-outlined">history</span><span id="side-nav-history">History</span>
          </button>
        </nav>

        <button id="new-analysis" class="mt-auto py-3.5 rounded-xl2 font-bold text-white bg-gradient-to-br from-primary to-primary-container shadow-ambient hover:opacity-95 transition-opacity">New Analysis</button>
      </aside>

      <main class="flex-1 min-h-[calc(100vh-64px)] p-4 md:p-8 bg-surface">
        <div id="app" class="max-w-7xl mx-auto"></div>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
