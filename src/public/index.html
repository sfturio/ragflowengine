<!DOCTYPE html>
<html class="light" lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAGFlow Engine</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'surface': '#F7F9FC',
              'surface-container-low': '#F1F5FB',
              'surface-container-lowest': '#FFFFFF',
              'surface-container-high': '#EEF2F8',
              'surface-container-highest': '#E5E7EB',
              'on-surface': '#111827',
              'on-surface-variant': '#6B7280',
              'primary': '#5B6CFF',
              'primary-container': '#4F5EF7',
              'primary-fixed': '#F4F7FF',
              'tertiary-container': '#F59E0B',
              'outline-variant': '#E5E7EB',
              'error': '#F04438'
            },
            boxShadow: {
              ambient: '0 10px 30px rgba(0,0,0,0.06)'
            },
            borderRadius: {
              xl2: '1rem'
            }
          }
        }
      };
    </script>
    <style>
      body { font-family: 'Inter', sans-serif; }
      :root {
        --priority-high-tint: #FFF1F2;
        --priority-high-accent: #E11D48;
        --priority-medium-tint: #FFFBEB;
        --priority-medium-accent: #D97706;
        --priority-low-tint: #EFF6FF;
        --priority-low-accent: #2563EB;
        --card-radius: 17px;
        --card-radius-soft: 14px;
        --card-surface: #FFFFFF;
        --card-surface-soft: #FCFDFF;
        --card-border: rgba(229, 231, 235, 0.55);
        --card-shadow: 0 12px 32px rgba(27, 28, 29, 0.06), 0 2px 8px rgba(27, 28, 29, 0.04);
        --card-shadow-soft: 0 8px 20px rgba(27, 28, 29, 0.045), 0 1px 2px rgba(27, 28, 29, 0.03);
        --card-shadow-hover: 0 20px 42px rgba(27, 28, 29, 0.09), 0 6px 14px rgba(27, 28, 29, 0.06);
      }
      html.dark {
        color-scheme: dark;
        --card-surface: #0f172a;
        --card-surface-soft: #111b31;
        --card-border: rgba(148, 163, 184, 0.24);
        --card-shadow: 0 16px 36px rgba(2, 6, 23, 0.5), 0 2px 10px rgba(2, 6, 23, 0.35);
        --card-shadow-soft: 0 10px 24px rgba(2, 6, 23, 0.42), 0 2px 6px rgba(2, 6, 23, 0.3);
        --card-shadow-hover: 0 24px 48px rgba(2, 6, 23, 0.58), 0 8px 20px rgba(2, 6, 23, 0.44);
      }
      html.dark body {
        background:
          radial-gradient(1300px 520px at 8% -10%, rgba(91, 108, 255, 0.23), transparent 64%),
          radial-gradient(900px 360px at 92% -6%, rgba(16, 185, 129, 0.17), transparent 58%),
          #020617;
        color: #e2e8f0;
      }
      html.dark .bg-surface { background-color: #020617 !important; }
      html.dark .bg-surface-container-low { background-color: #0b1325 !important; }
      html.dark .bg-surface-container-lowest { background-color: #0f172a !important; }
      html.dark .bg-surface-container-high { background-color: #1e293b !important; }
      html.dark .bg-surface-container-highest { background-color: #334155 !important; }
      html.dark .text-on-surface { color: #e2e8f0 !important; }
      html.dark .text-on-surface-variant { color: #94a3b8 !important; }
      html.dark [class*="border-outline-variant"] { border-color: rgba(148, 163, 184, 0.24) !important; }
      html.dark .shadow-sm { box-shadow: 0 10px 24px rgba(2, 6, 23, 0.34) !important; }
      html.dark .editorial-grid {
        background-image: radial-gradient(circle at 1px 1px, rgba(148, 163, 184, 0.12) 1px, transparent 0);
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 450, 'GRAD' 0, 'opsz' 24;
      }
      .glass-nav {
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .editorial-grid {
        background-image: radial-gradient(circle at 1px 1px, rgba(70, 69, 84, 0.05) 1px, transparent 0);
        background-size: 24px 24px;
      }
      .mono-label {
        font-family: 'JetBrains Mono', monospace;
        letter-spacing: 0.1em;
        font-size: 0.6875rem;
      }
      .progress-ring {
        transform: rotate(-90deg);
      }
      .progress-ring__track {
        stroke: rgba(229, 231, 235, 0.9);
      }
      .progress-ring__value {
        stroke: #5B6CFF;
        stroke-linecap: round;
        transition: stroke-dashoffset 0.4s ease;
      }
      .premium-card {
        border-radius: var(--card-radius);
        border: 1px solid var(--card-border);
        background: var(--card-surface);
        box-shadow: var(--card-shadow);
      }
      .premium-card-soft {
        background: var(--card-surface-soft);
      }
      .premium-hover {
        transition: transform 200ms ease, box-shadow 200ms ease, background-color 200ms ease;
      }
      .premium-hover:hover {
        transform: translateY(-2px);
        box-shadow: var(--card-shadow-hover);
      }
      html.dark .glass-nav {
        background-color: rgba(10, 16, 34, 0.88) !important;
        border-color: rgba(148, 163, 184, 0.24) !important;
      }
    </style>
  </head>
  <body class="bg-surface text-on-surface">
    <nav class="fixed top-0 left-0 right-0 z-50 h-16 px-6 bg-surface-container-lowest/90 glass-nav border-b border-outline-variant/70 flex items-center">
      <div class="font-bold tracking-tight text-xl">AI Career Suite</div>
      <div class="hidden md:flex items-center gap-3 ml-8 text-sm font-semibold text-on-surface-variant">
        <span id="nav-other-text">Check our other app:</span>
        <a id="nav-other-link" href="https://atsflowengine.onrender.com/" target="_blank" rel="noopener noreferrer" class="text-primary hover:text-primary-container transition-colors">ATSFlow Engine</a>
      </div>
      <div class="ml-auto flex items-center gap-3">
        <button id="theme-toggle" class="flex items-center gap-2 px-3 py-1.5 rounded-lg border border-outline-variant/60 bg-surface-container-low text-xs font-semibold hover:bg-surface-container-high transition-colors" aria-label="Alternar tema">
          <span id="theme-toggle-icon" class="material-symbols-outlined text-[18px]">dark_mode</span>
          <span id="theme-toggle-text">Light</span>
        </button>
        <span class="material-symbols-outlined text-on-surface-variant">auto_awesome</span>
      </div>
    </nav>

    <div class="pt-16 min-h-screen flex">
      <aside class="hidden lg:flex flex-col w-72 h-[calc(100vh-64px)] sticky top-16 bg-surface-container-low p-5 gap-6 editorial-grid border-r border-outline-variant/70">
        <div class="flex items-center gap-3 mb-8 px-2">
          <div class="w-8 h-8 rounded-lg bg-primary-container flex items-center justify-center text-white">
            <span class="material-symbols-outlined text-sm" style="font-variation-settings:'FILL' 1">psychology</span>
          </div>
          <div>
            <p class="text-lg font-bold leading-none">RAGFlow</p>
            <p class="text-[10px] text-on-surface-variant uppercase tracking-widest mt-1">Intelligent Workspace</p>
          </div>
        </div>

        <nav class="space-y-1" id="side-nav">
          <button data-nav="match" class="w-full text-left px-4 py-3 rounded-xl bg-surface-container-lowest text-primary shadow-sm font-semibold flex items-center gap-3">
            <span class="material-symbols-outlined">analytics</span><span id="side-nav-match">Match Analysis</span>
          </button>
          <button data-nav="result" class="w-full text-left px-4 py-3 rounded-xl text-on-surface-variant hover:bg-surface-container-high transition-colors font-semibold flex items-center gap-3">
            <span class="material-symbols-outlined">insights</span><span id="side-nav-result">Career Result</span>
          </button>
          <button data-nav="history" class="w-full text-left px-4 py-3 rounded-xl text-on-surface-variant hover:bg-surface-container-high transition-colors font-semibold flex items-center gap-3">
            <span class="material-symbols-outlined">history</span><span id="side-nav-history">History</span>
          </button>
          <button data-nav="about" class="w-full text-left px-4 py-3 rounded-xl text-on-surface-variant hover:bg-surface-container-high transition-colors font-semibold flex items-center gap-3">
            <span class="material-symbols-outlined">info</span><span id="side-nav-about">Sobre</span>
          </button>
        </nav>

        <button id="new-analysis" class="mt-auto py-3.5 rounded-xl2 font-bold text-white bg-gradient-to-br from-primary to-primary-container shadow-ambient hover:opacity-95 transition-opacity">New Analysis</button>
        <div id="sidebar-support" class="pt-1 border-t border-outline-variant/30"></div>
      </aside>

      <main class="flex-1 min-h-[calc(100vh-64px)] p-4 md:p-8 bg-surface">
        <div id="app" class="max-w-[1360px] mx-auto"></div>
      </main>
    </div>

    <div id="modal-root"></div>

    <script src="/app.js"></script>
  </body>
</html>
